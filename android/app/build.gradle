plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.nohumanitybot'

    defaultConfig {
        applicationId "com.nohumanitybot"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.quickbirdstudios:opencv:4.5.3.0'
}
